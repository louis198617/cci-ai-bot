<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI教练对话练习平台 | CCI · AI Coaching Practice Platform</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sora:wght@300;400;600;700;800&family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       CCI COACHING PLATFORM — DESIGN SYSTEM v2
       Aesthetic: Warm Editorial / Deep Workspace
       Primary: Deep Teal  (#0B6E73)
       Accent:  Gold       (#C5921A)
       Dark:    Ink Navy   (#16202C)
       ============================================================ */
    :root {
      /* Teal – core brand */
      --teal:        #0B6E73;
      --teal-dark:   #085458;
      --teal-deeper: #053E42;
      --teal-mid:    #1A9FA8;
      --teal-light:  #DFF0F1;
      --teal-pale:   #EEF6F7;

      /* Gold – accent */
      --gold:        #C5921A;
      --gold-dark:   #A47614;
      --gold-light:  #FFF6E0;
      --gold-mid:    #E8A920;

      /* Neutrals — warm editorial palette */
      --navy:        #16202C;
      --navy-light:  #2C3E52;
      --bg:          #F3F1EC;
      --bg-alt:      #EAE7E0;
      --white:       #FEFCF8;
      --card:        #FEFCF8;
      --border:      #DDD8CF;
      --border-light:#E8E4DC;
      --text:        #16202C;
      --text-light:  #4A5C6B;
      --text-muted:  #96A4AE;

      /* Semantic */
      --success:     #057A55;
      --success-bg:  #ECFDF5;
      --warning:     #D97706;
      --warning-bg:  #FFFBEB;
      --danger:      #C0392B;
      --danger-bg:   #FEF2F2;

      /* Provider brand colors */
      --anthropic:   #D97706;
      --openai:      #10A37F;
      --google:      #4285F4;
      --openrouter:  #7C3AED;

      /* Radius — crisper */
      --r:   6px;
      --rlg: 10px;
      --rxl: 14px;

      /* Shadows — warm-toned, not cold gray */
      --shadow-sm: 0 1px 4px rgba(22,32,44,.06);
      --shadow:    0 2px 12px rgba(22,32,44,.09);
      --shadow-lg: 0 8px 32px rgba(22,32,44,.13);

      /* Typography */
      --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-body:    'Sora', 'Noto Sans SC', system-ui, sans-serif;
    }

    /* Page-load entrance animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 65%, rgba(11,110,115,.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(197,146,26,.04) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
    }

    /* ---- APP HEADER ---- */
    .app-header {
      background: var(--navy);
      color: white;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 1px 0 rgba(255,255,255,.06), 0 4px 20px rgba(0,0,0,.28);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .logo-wrap { display: flex; align-items: center; gap: 14px; }
    .logo-emblem {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold-mid) 0%, var(--gold) 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: white;
      letter-spacing: -.5px;
      font-family: var(--font-display);
      box-shadow: 0 2px 8px rgba(197,146,26,.4);
      flex-shrink: 0;
    }
    .logo-text { line-height: 1.25; }
    .logo-text .l1 {
      font-size: 14px; font-weight: 700; letter-spacing: .2px;
      color: white;
    }
    .logo-text .l2 {
      font-size: 10px; color: rgba(255,255,255,.42);
      letter-spacing: 1.2px; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .lang-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.75);
      padding: 5px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-family: var(--font-body);
      transition: all .15s;
    }
    .lang-btn:hover { background: rgba(255,255,255,.16); color: white; }
    .header-badge {
      background: var(--gold);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 3px;
      letter-spacing: .5px;
    }

    /* ---- MAIN LAYOUT ---- */
    .main { padding: 36px 28px; max-width: 1100px; margin: 0 auto; }

    /* ---- CARD ---- */
    .card {
      background: var(--card);
      border-radius: var(--rlg);
      box-shadow: var(--shadow-sm);
      padding: 28px;
      border: 1px solid var(--border-light);
    }
    .card-title {
      font-size: 15px; font-weight: 700;
      color: var(--teal-dark);
      margin-bottom: 6px;
    }
    .card-sub { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 7px; padding: 10px 22px;
      border-radius: var(--r); font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all .15s; text-decoration: none;
      letter-spacing: .3px; font-family: var(--font-body);
    }
    .btn-primary {
      background: var(--teal);
      color: white;
      box-shadow: 0 1px 4px rgba(11,110,115,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--teal-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(11,110,115,.35);
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-gold {
      background: var(--gold);
      color: white;
      box-shadow: 0 1px 4px rgba(197,146,26,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .btn-gold:hover:not(:disabled) { background: var(--gold-dark); transform: translateY(-1px); }
    .btn-gold:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent; color: var(--teal);
      border: 1.5px solid var(--teal);
    }
    .btn-outline:hover { background: var(--teal-pale); }
    .btn-ghost {
      background: transparent; color: var(--text-light);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #A93226; }
    .btn-sm { padding: 5px 13px; font-size: 12px; }
    .btn-lg { padding: 13px 30px; font-size: 14px; letter-spacing: .5px; }
    .btn-full { width: 100%; }

    /* ---- FORM ---- */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .8px;
    }
    .form-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r); font-size: 14px; color: var(--text);
      background: var(--white); transition: border-color .15s, box-shadow .15s;
      font-family: var(--font-body);
    }
    .form-input:focus {
      outline: none; border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(11,110,115,.1);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-textarea { resize: vertical; min-height: 88px; }
    .form-hint { font-size: 12px; color: var(--text-light); margin-top: 5px; }

    /* ---- SECURITY NOTICE ---- */
    .security-notice {
      background: linear-gradient(135deg, #FFF8E8 0%, #FFF3D0 100%);
      border: 1px solid #F0D080;
      border-radius: var(--r);
      padding: 12px 16px;
      font-size: 13px; color: #6B4A0A;
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 16px;
    }

    /* ============================================================
       PROVIDER SELECTOR
       ============================================================ */
    .provider-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .provider-card {
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 12px 10px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      background: white;
    }
    .provider-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .provider-card.sel-anthropic { border-color: var(--anthropic); background: #FFF8F0; }
    .provider-card.sel-openai    { border-color: var(--openai);    background: #F0FDF8; }
    .provider-card.sel-google    { border-color: var(--google);    background: #F0F5FF; }
    .provider-card.sel-openrouter{ border-color: var(--openrouter);background: #F5F0FF; }
    .provider-icon { font-size: 22px; margin-bottom: 5px; }
    .provider-name { font-size: 12px; font-weight: 800; color: var(--navy); }
    .provider-hint { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .provider-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin: 4px auto 0;
      background: var(--border);
    }
    .provider-card.sel-anthropic .provider-dot { background: var(--anthropic); }
    .provider-card.sel-openai    .provider-dot { background: var(--openai); }
    .provider-card.sel-google    .provider-dot { background: var(--google); }
    .provider-card.sel-openrouter .provider-dot { background: var(--openrouter); }

    /* ---- API GUIDE BOX ---- */
    .api-guide {
      background: var(--bg); border: 1px solid var(--border-light);
      border-radius: var(--r); padding: 16px 18px; margin-bottom: 16px;
      position: relative;
    }
    .api-guide-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; cursor: pointer;
    }
    .api-guide-title {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .8px;
      display: flex; align-items: center; gap: 6px;
    }
    .api-guide-toggle {
      font-size: 10px; color: var(--teal); font-weight: 600;
      background: none; border: none; cursor: pointer;
      letter-spacing: .5px;
    }
    .api-guide-toggle:hover { text-decoration: underline; }
    .api-guide-body { display: none; }
    .api-guide.open .api-guide-body { display: block; }
    .api-guide-steps {
      list-style: none; counter-reset: step; padding: 0; margin: 0 0 12px;
    }
    .api-guide-steps li {
      counter-increment: step;
      font-size: 13px; color: var(--text-light); line-height: 1.6;
      padding: 5px 0 5px 28px; position: relative;
    }
    .api-guide-steps li::before {
      content: counter(step);
      position: absolute; left: 0; top: 6px;
      width: 20px; height: 20px; border-radius: 4px;
      background: var(--teal-light); color: var(--teal);
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .api-guide-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      padding-top: 10px; border-top: 1px solid var(--border-light);
    }
    .api-guide-pricing {
      font-size: 11px; color: var(--text-muted); letter-spacing: .2px;
    }
    .api-guide-link {
      font-size: 12px; font-weight: 700; color: var(--teal);
      text-decoration: none; letter-spacing: .3px;
      display: inline-flex; align-items: center; gap: 4px;
      transition: gap .15s;
    }
    .api-guide-link:hover { gap: 8px; text-decoration: none; }

    /* ============================================================
       HOME HERO — Dark editorial with geometric grid
       ============================================================ */
    .home-hero {
      background-color: var(--navy);
      background-image:
        linear-gradient(rgba(11,110,115,.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(11,110,115,.22) 1px, transparent 1px);
      background-size: 44px 44px;
      border-radius: var(--rxl);
      padding: 54px 46px;
      color: white;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .5s ease both;
    }
    .home-hero::before {
      content: '';
      position: absolute; bottom: -80px; right: -60px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(11,110,115,.45) 0%, transparent 70%);
      pointer-events: none;
    }
    .home-hero::after {
      content: '';
      position: absolute; top: -50px; left: 32%;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(197,146,26,.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .home-hero-inner { position: relative; z-index: 1; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(197,146,26,.16);
      border: 1px solid rgba(197,146,26,.38);
      color: #F5CC6A;
      font-size: 11px; font-weight: 600;
      padding: 4px 12px; border-radius: 3px;
      margin-bottom: 18px; letter-spacing: .9px;
      text-transform: uppercase;
    }
    .home-hero h1 {
      font-size: 38px; font-weight: 900; line-height: 1.12;
      margin-bottom: 14px;
      font-family: var(--font-display);
      letter-spacing: -.5px;
    }
    .home-hero h1 span { color: #F5CC6A; }
    .home-hero p { font-size: 15px; color: rgba(255,255,255,.68); max-width: 560px; line-height: 1.72; }
    .hero-stats {
      display: flex; gap: 32px; margin-top: 30px; flex-wrap: wrap;
    }
    .hero-stat { text-align: left; }
    .hero-stat .num {
      font-size: 30px; font-weight: 900; color: #F5CC6A;
      font-family: var(--font-display); line-height: 1;
    }
    .hero-stat .label { font-size: 11px; color: rgba(255,255,255,.52); margin-top: 3px; letter-spacing: .5px; }

    /* ---- MODE CARDS ---- */
    .mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
    .mode-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--rlg);
      padding: 26px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      animation: fadeUp .5s ease both;
    }
    .mode-card:nth-child(1) { animation-delay: .06s; }
    .mode-card:nth-child(2) { animation-delay: .12s; }
    .mode-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--teal-mid));
      opacity: 0; transition: opacity .2s;
    }
    .mode-card:hover { border-color: var(--teal); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .mode-card:hover::before { opacity: 1; }
    .mode-card.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .mode-icon { font-size: 32px; margin-bottom: 14px; }
    .mode-title {
      font-size: 16px; font-weight: 700; color: var(--navy);
      margin-bottom: 7px; font-family: var(--font-display);
    }
    .mode-desc { font-size: 13px; color: var(--text-light); line-height: 1.62; }
    .mode-cta {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 16px; font-size: 11px; font-weight: 700;
      color: var(--teal); transition: gap .15s;
      letter-spacing: .8px; text-transform: uppercase;
    }
    .mode-card:hover .mode-cta { gap: 10px; }

    /* ============================================================
       SETUP VIEW
       ============================================================ */
    .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .opt-btn {
      border: 2px solid var(--border);
      background: white; border-radius: var(--r);
      padding: 14px 16px; cursor: pointer; text-align: left;
      transition: all .18s; display: flex; align-items: flex-start; gap: 12px;
      width: 100%;
    }
    .opt-btn:hover { border-color: var(--teal); background: var(--teal-light); }
    .opt-btn.selected { border-color: var(--teal); background: var(--teal-light); }
    .opt-btn .oi { font-size: 20px; margin-top: 1px; }
    .opt-btn .ot { font-size: 14px; font-weight: 800; color: var(--navy); }
    .opt-btn .od { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .model-tag {
      display: inline-block; background: var(--teal-deeper);
      color: white; font-size: 11px; font-weight: 800;
      padding: 2px 7px; border-radius: 4px; margin-bottom: 3px;
    }
    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .scenario-item {
      border: 2px solid var(--border); background: white;
      border-radius: var(--r); padding: 12px 16px;
      cursor: pointer; font-size: 13px; color: var(--text);
      transition: all .18s; display: flex; align-items: center; gap: 8px;
    }
    .scenario-item:hover { border-color: var(--teal); background: var(--teal-light); }
    .scenario-item.selected { border-color: var(--teal); background: var(--teal-light); font-weight: 700; }
    .scenario-num {
      min-width: 20px; height: 20px; border-radius: 4px;
      background: var(--teal-light); color: var(--teal);
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .scenario-item.selected .scenario-num { background: var(--teal); color: white; }

    /* ---- BREADCRUMB ---- */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); margin-bottom: 22px;
    }
    .breadcrumb .bc-link { color: var(--teal); cursor: pointer; font-weight: 600; }
    .breadcrumb .bc-link:hover { text-decoration: underline; }

    /* ============================================================
       CHAT VIEW
       ============================================================ */
    .chat-page {
      padding: 16px 24px;
      height: calc(100vh - 60px);
      display: flex; flex-direction: column; gap: 14px;
      max-width: 1200px; margin: 0 auto;
    }
    .chat-layout { display: grid; grid-template-columns: 1fr 300px; gap: 14px; flex: 1; min-height: 0; }
    .chat-panel {
      display: flex; flex-direction: column;
      background: var(--card); border-radius: var(--rlg);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .chat-bar {
      background: var(--navy);
      color: white; padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .chat-bar-info strong { font-size: 14px; font-weight: 800; display: block; }
    .chat-bar-meta { font-size: 11px; opacity: .72; margin-top: 2px; }
    .turn-pill {
      background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
      padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;
    }
    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .chat-msgs::-webkit-scrollbar { width: 5px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sys-msg { text-align: center; font-size: 12px; color: var(--text-muted); padding: 4px; }
    .msg { max-width: 76%; display: flex; flex-direction: column; gap: 4px; }
    .msg.ai { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 0 4px; }
    .msg.user .msg-lbl { text-align: right; }
    .msg-bbl {
      padding: 12px 16px; border-radius: var(--rlg);
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.ai .msg-bbl {
      background: var(--teal-pale); color: var(--text);
      border: 1px solid var(--teal-light);
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bbl {
      background: var(--navy);
      color: white; border-bottom-right-radius: 3px;
    }
    .typing-bbl { background: var(--teal-pale); border: 1px solid var(--teal-light); padding: 14px 20px; border-radius: var(--rlg); border-bottom-left-radius: 4px; }
    .dots { display: flex; gap: 5px; align-items: center; }
    .dots span { width: 7px; height: 7px; background: var(--teal-mid); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .chat-input-row {
      border-top: 1px solid var(--border-light);
      padding: 11px 13px;
      display: flex; gap: 9px; align-items: flex-end;
      flex-shrink: 0; background: var(--card);
    }
    .chat-in {
      flex: 1; border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 14px;
      font-size: 14px; resize: none;
      min-height: 42px; max-height: 120px; line-height: 1.5;
      font-family: var(--font-body); color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
    }
    .chat-in:focus { outline: none; border-color: var(--teal); background: var(--white); box-shadow: 0 0 0 3px rgba(11,110,115,.1); }
    .chat-in:disabled { opacity: .6; cursor: not-allowed; }
    .send-btn {
      width: 42px; height: 42px;

   { id, name, role, dept, personality, notes, history: [{date, situ, tried, goal, summary}] }
   ============================================================== */
const PROFILE_STORAGE_KEY = 'cci_profiles';

function loadProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILE_STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveProfiles(profiles) {
  localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles));
}
function getProfile(id) {
  return loadProfiles().find(p => p.id === id) || null;
}
function createProfile(data) {
  const profiles = loadProfiles();
  const profile = {
    id: 'p_' + Date.now(),
    name: data.name || '',
    role: data.role || '',
    dept: data.dept || '',
    personality: data.personality || '',
    notes: data.notes || '',
    history: [],
    createdAt: new Date().toISOString(),
  };
  profiles.push(profile);
  saveProfiles(profiles);
  return profile;
}
function updateProfile(id, data) {
  const profiles = loadProfiles();
  const idx = profiles.findIndex(p => p.id === id);
  if (idx < 0) return null;
  Object.assign(profiles[idx], data);
  saveProfiles(profiles);
  return profiles[idx];
}
function deleteProfile(id) {
  const profiles = loadProfiles().filter(p => p.id !== id);
  saveProfiles(profiles);
  if (S.profileId === id) S.profileId = null;
}
function addHistoryToProfile(id, entry) {
  const profiles = loadProfiles();
  const p = profiles.find(p => p.id === id);
  if (!p) return;
  p.history = p.history || [];
  p.history.unshift({
    date: new Date().toISOString(),
    situ: entry.situ || '',
    tried: entry.tried || '',
    goal: entry.goal || '',
    summary: entry.summary || '',
  });
  // Keep max 20 history entries
  if (p.history.length > 20) p.history = p.history.slice(0, 20);
  saveProfiles(profiles);
}

// Track which history items are expanded (by index)
const expandedHistory = new Set();
function toggleHistory(idx) {
  if (expandedHistory.has(idx)) expandedHistory.delete(idx);
  else expandedHistory.add(idx);
  render();
}

// Set default model for current provider
function defaultModel() {
  return PROVIDERS[S.provider]?.models?.[0]?.id || '';
}
S.selectedModel = sessionStorage.getItem('ccp_model') || defaultModel();

function set(u) { Object.assign(S, u); render(); }

/* ── Proxy helper ─────────────────────────────────────────────────────────
   When running via the local server (localhost / 127.0.0.1), all API calls
   are routed through /proxy (same-origin) to avoid CORS restrictions.
   When opened directly as a file:// URL the old direct-fetch path is used
   (may fail in some browsers due to CORS).
   ──────────────────────────────────────────────────────────────────────── */
const USE_PROXY = ['localhost','127.0.0.1'].includes(location.hostname);

async function proxyFetch(url, headers, body) {
  if (USE_PROXY) {
    let r;
    try {
      r = await fetch('/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, headers, body }),
      });
    } catch (netErr) {
      throw new Error(
        S.lang === 'zh'
          ? '无法连接到本地代理服务器。请确认：① 终端窗口是否还在运行 ② 使用「启动平台 Start Server.command」启动'
          : 'Cannot reach local proxy. Ensure the terminal window is still running and you launched via Start Server.command'
      );
    }
    if (!r.ok) {
      let detail = '';
      try { detail = await r.text(); } catch {}
      throw new Error(`API ${r.status}: ${detail}`);
    }
    return r.json();
  } else {
    // Direct fetch fallback (may be blocked by CORS on some browsers)
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...headers },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    return r.json();
  }
}

async function callAPI(messages, sysPrompt) {
  switch (S.provider) {
    case 'anthropic':   return callAnthropic(messages, sysPrompt);
    case 'openai':      return callOpenAI(messages, sysPrompt);
    case 'google':      return callGoogle(messages, sysPrompt);
    case 'openrouter':  return callOpenRouter(messages, sysPrompt);
    default:            return callAnthropic(messages, sysPrompt);
  }
}

async function callAnthropic(messages, sys) {
  const data = await proxyFetch(
    'https://api.anthropic.com/v1/messages',
    {
      'x-api-key': S.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    { model: S.selectedModel, max_tokens: 1024, system: sys, messages },
  );
  if (data.error) throw new Error(`Anthropic: ${data.error.message || JSON.stringify(data.error)}`);
  return data.content[0].text;
}

async function callOpenAI(messages, sys) {
  const data = await proxyFetch(
    'https://api.openai.com/v1/chat/completions',
    { 'Authorization': `Bearer ${S.apiKey}` },
    { model: S.selectedModel, max_tokens: 1024, messages: [{ role:'system', content: sys }, ...messages] },
  );
  if (data.error) throw new Error(`OpenAI: ${data.error.message || JSON.stringify(data.error)}`);
  return data.choices[0].message.content;
}

async function callGoogle(messages, sys) {
  const contents = messages.map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.content }],
  }));
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${S.selectedModel}:generateContent?key=${S.apiKey}`;
  const data = await proxyFetch(
    url, {},
    { contents, systemInstruction: { parts: [{ text: sys }] }, generationConfig: { maxOutputTokens: 1024 } },
  );
  if (data.error) throw new Error(`Google: ${data.error.message || JSON.stringify(data.error)}`);
  return data.candidates[0].content.parts[0].text;
}

async function callOpenRouter(messages, sys) {
  const data = await proxyFetch(
    'https://openrouter.ai/api/v1/chat/completions',
    {
      'Authorization': `Bearer ${S.apiKey}`,
      'HTTP-Referer': 'https://coachingcultureinternational.com',
      'X-Title': 'AI Coaching Practice Platform',
    },
    { model: S.selectedModel, max_tokens: 1024, messages: [{ role:'system', content: sys }, ...messages] },
  );
  if (data.error) throw new Error(`OpenRouter: ${data.error.message || JSON.stringify(data.error)}`);
  return data.choices[0].message.content;
}

function parseCaseOutput(text) {
  const raw = text.replace(/^## /m, '\n## ').split(/\n## /).filter(Boolean);
  return `<div class="card">` + raw.map(sec => {
    const nl = sec.indexOf('\n');
    const title = nl>0 ? sec.substring(0,nl).trim() : sec.trim();
    const body = nl>0 ? sec.substring(nl+1).trim() : '';
    const lines = body.split('\n').filter(l=>l.trim()).map(line => {
      const clean = line.replace(/^[\d\.\-\*\s]+/, '').trim();
      if (!clean) return '';
      if (/[？"""]/.test(clean) || /^(What|How|Where|When|Why|If|Tell|Can|在|你|什么|怎么|如果|请)/i.test(clean)) {
        return `<div class="q-chip">${esc(clean)}</div>`;
      }
      return `<p style="font-size:13px;color:var(--text-light);margin-bottom:6px;line-height:1.6">• ${esc(clean)}</p>`;
    }).join('');
    return `<div class="case-block"><h4>${esc(title)}</h4><div style="margin-top:4px">${lines}</div></div>`;
  }).join('') + `</div>`;
}

function selectProfile(id) {

function saveProfileForm(existingId) {
  const name = (document.getElementById('pfName')?.value || '').trim();
  if (!name) { alert(S.lang==='zh'?'请输入姓名':'Name is required'); return; }
  const data = {
    name,
    role: (document.getElementById('pfRole')?.value || '').trim(),
    dept: (document.getElementById('pfDept')?.value || '').trim(),
    personality: (document.getElementById('pfPersonality')?.value || '').trim(),
    notes: (document.getElementById('pfNotes')?.value || '').trim(),
  };
  if (existingId) {
    updateProfile(existingId, data);
    set({ showProfileForm: false, editingProfileId: null });
  } else {
    const p = createProfile(data);
    set({ profileId: p.id, showProfileForm: false, editingProfileId: null });
  }
}

function buildProfileContext() {
  const p = S.profileId ? getProfile(S.profileId) : null;
  if (!p) return '';
  const zh = S.lang === 'zh';
  let ctx = zh
    ? `\n\n=== 员工档案 ===\n姓名：${p.name}`
    : `\n\n=== Employee Profile ===\nName: ${p.name}`;
  if (p.role) ctx += zh ? `\n职位：${p.role}` : `\nRole: ${p.role}`;
  if (p.dept) ctx += zh ? `\n部门：${p.dept}` : `\nDept: ${p.dept}`;
  if (p.personality) ctx += zh ? `\n性格特点：${p.personality}` : `\nPersonality: ${p.personality}`;
  if (p.notes) ctx += zh ? `\n备注：${p.notes}` : `\nNotes: ${p.notes}`;
  if (p.history && p.history.length > 0) {
    ctx += zh ? `\n\n--- 历史案例记录 (共${p.history.length}条，显示最近5条) ---` : `\n\n--- Case History (${p.history.length} total, showing latest 5) ---`;
    p.history.slice(0, 5).forEach((h, i) => {
      const d = new Date(h.date).toLocaleDateString(zh?'zh-CN':'en-US');
      ctx += `\n[${d}] `;
      ctx += zh ? `情况：${h.situ||'N/A'}` : `Situation: ${h.situ||'N/A'}`;
      if (h.summary) ctx += zh ? ` → 要点：${h.summary}` : ` → Key points: ${h.summary}`;
    });
  }
  ctx += zh
    ? `\n\n请结合以上员工档案和历史记录来分析当前问题，在回答中体现对该员工的了解和之前案例的关联性。`
    : `\n\nPlease incorporate the above employee profile and history when analyzing the current case. Show awareness of patterns and connections to past cases.`;
  return ctx;
}

function startChat() {
  let sc = S.scenario;
  if (sc==='custom') {
    const el = document.getElementById('customScIn');
    const v = el ? el.value.trim() : S.customScenarioText;
    if (!v) { alert(t('errSc')); return; }
    S.customScenarioText = v;
    sc = v;
  } else if (typeof sc === 'number') {
    sc = t('scenarios')[sc];
  } else { alert(t('errSc')); return; }

  // Hardcoded employee opening — no API call needed to start
  const openings = {
    zh: [
      '嗯…你好，你找我是有什么事吗？',
      '你好，我听说你想跟我谈谈？',
      '嗯…好的，你说吧，什么事？',
    ],
    en: [
      'Hi, you wanted to speak with me?',
      'Hey, I heard you wanted to have a chat?',
      'Hi… so what did you want to talk about?',
    ],
  };
  const pool = openings[S.lang] || openings.zh;
  const opening = pool[Math.floor(Math.random() * pool.length)];

  set({
    view: 'chat',
    messages: [{ role: 'assistant', content: opening }],
    userMessages: [],
    turnCount: 0,
    isLoading: false,
    error: '',
    activeScenario: sc,
  });
}

async function sendMsg() {
  const el = document.getElementById('chatIn');
  if (!el) return;
  const text = el.value.trim();
  if (!text || S.isLoading) return;
  el.value = ''; el.style.height='auto';

  S.messages = [...S.messages, { role:'user', content:text }];
  S.userMessages = [...S.userMessages, text];
  S.turnCount += 1;
  S.isLoading = true; S.error = '';
  render();

  try {
    const sys = empPrompt(S.activeScenario, S.difficulty, S.coachModel, S.lang);
    const reply = await callAPI(S.messages, sys);
    S.messages = [...S.messages, { role:'assistant', content:reply }];
    S.isLoading = false;
    render();
  } catch(e) {
    S.isLoading = false;
    set({ error: t('errApi') + ' ' + (e.message||'') });
  }
}

async function endSession() {
  if (S.userMessages.length < 1) { resetHome(); return; }
  S.feedbackLoading = true;
  S.error = '';
  set({ view:'feedback' });

  try {
    const sys = fbPrompt(S.coachModel, S.activeScenario, S.lang);
    const convo = S.messages.map(m=>`${m.role==='user'?(S.lang==='zh'?'经理':'Manager'):(S.lang==='zh'?'员工':'Employee')}: ${m.content}`).join('\n\n');
    const uMsgs = S.userMessages.map((m,i)=>`${i+1}. ${m}`).join('\n');
    const prompt = S.lang==='zh'
      ? `请评估以下教练对话：\n\n${convo}\n\n经理的所有发言（共${S.userMessages.length}条）：\n${uMsgs}`
      : `Please evaluate the following coaching conversation:\n\n${convo}\n\nManager's statements (${S.userMessages.length} total):\n${uMsgs}`;

    const raw = await callAPI([{ role:'user', content:prompt }], sys);
    let fb;
    try {
      const m = raw.match(/\{[\s\S]*\}/);
      fb = JSON.parse(m ? m[0] : raw);
    } catch {
      fb = {
        lineReview: S.userMessages.map(m=>({ message:m, rating:'warning', comment: S.lang==='zh'?'解析失败，请重试':'Parse failed, please retry', suggestion:'' })),
        scores:{ listening:12, questioning:12, modelAdherence:12, avoidingAdvice:12, safeSpace:12 },
        highlights:[S.lang==='zh'?'完成了完整对话练习':'Completed a full practice session'],
        improvements:[S.lang==='zh'?'请重试以获取详细反馈':'Please retry for detailed feedback'],
        nextSteps: S.lang==='zh'?'继续保持练习！':'Keep practicing!',
      };
    }
    S.feedbackLoading = false;
    set({ feedback:fb, feedbackLang: S.lang });
  } catch(e) {
    S.feedbackLoading = false;
    const errMsg = S.lang==='zh'
      ? `获取反馈失败：${e.message||'未知错误'}。您可以返回首页重新开始。`
      : `Failed to get feedback: ${e.message||'Unknown error'}. You can return home to start over.`;
    set({ error: errMsg, view:'feedback', feedback: null });
  }
}

async function submitCase() {
  const situ  = document.getElementById('cSitu')?.value.trim();
  const tried = document.getElementById('cTried')?.value.trim();
  const goal  = document.getElementById('cGoal')?.value.trim();
  if (!situ||!goal) { set({ error: S.lang==='zh'?'请填写情况描述和期望结果':'Please fill in the situation and desired outcome.' }); return; }
  S.caseSitu=situ; S.caseTried=tried; S.caseGoal=goal;
  S.caseLoading=true; S.error=''; S.caseOutput=null;
  render();

  try {
    const profileCtx = buildProfileContext();
    const sys = casePrompt(S.lang) + profileCtx;
    const prompt = S.lang==='zh'
      ? `情况：${situ}\n\n已尝试方法：${tried||'未提及'}\n\n期望结果：${goal}`
      : `Situation: ${situ}\n\nAlready tried: ${tried||'Not mentioned'}\n\nDesired outcome: ${goal}`;
    const out = await callAPI([{ role:'user', content:prompt }], sys);
    S.caseLoading=false;
    // Save to profile history if a profile is selected
    if (S.profileId) {
      const summaryMatch = out.match(/##\s*(?:问题诊断|Problem Diagnosis)\s*\n([\s\S]*?)(?=\n##|$)/);
      const summary = summaryMatch ? summaryMatch[1].replace(/^[\s\-\*•]+/gm,'').trim().substring(0, 200) : '';
      addHistoryToProfile(S.profileId, { situ, tried, goal, summary });
    }
    set({ caseOutput:out, caseOutputLang: S.lang });
  } catch(e) {
    S.caseLoading=false;
    set({ error: t('errApi') + ' ' + (e.message||'') });
  }
}

/* Re-submit case in new language */
async function resubmitCase() {
  if (!S.caseSitu) return;
  S.caseLoading=true; S.error=''; S.caseOutput=null;
  render();
  try {
    const profileCtx = buildProfileContext();
    const sys = casePrompt(S.lang) + profileCtx;
    const prompt = S.lang==='zh'
      ? `情况：${S.caseSitu}\n\n已尝试方法：${S.caseTried||'未提及'}\n\n期望结果：${S.caseGoal}`
      : `Situation: ${S.caseSitu}\n\nAlready tried: ${S.caseTried||'Not mentioned'}\n\nDesired outcome: ${S.caseGoal}`;
    const out = await callAPI([{ role:'user', content:prompt }], sys);
    S.caseLoading=false;
    set({ caseOutput:out, caseOutputLang: S.lang });
  } catch(e) {
    S.caseLoading=false;
    set({ error: t('errApi') + ' ' + (e.message||'') });
  }
}

function resetHome() {
  set({ view:'home', messages:[], userMessages:[], turnCount:0, feedback:null, feedbackLoading:false, error:'', caseOutput:null });
}

/* ==============================================================
   UTILS
   ============================================================== */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollChat() {
  requestAnimationFrame(() => {
    const el = document.getElementById('chatMsgs');
    if (el) el.scrollTop = el.scrollHeight;
  });
}

/* ==============================================================
   TIP MODAL
   ============================================================== */
function showTip(index) {
  // Remove any existing modal
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();

  const tips = TIP_DATA[S.lang] || TIP_DATA.zh;
  const tip  = tips[index];
  if (!tip) return;

  const practiceLabel = S.lang === 'zh' ? '📋 实战练习方法' : '📋 Practice Techniques';
  const bookLabel     = S.lang === 'zh' ? '📖 书中原文' : '📖 From the Book';

  const el = document.createElement('div');
  el.className = 'modal-backdrop';
  el.innerHTML = `
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <span class="modal-head-icon">${tip.icon}</span>
        <div style="flex:1;min-width:0">
          <div class="modal-head-title" id="modal-title">${esc(tip.title)}</div>
          <div class="modal-head-sub">${esc(tip.sub)}</div>
        </div>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">${esc(tip.desc)}</p>

        <div class="modal-quote">
          <div class="modal-quote-label">${bookLabel}</div>
          <div class="modal-quote-text">"${esc(tip.quote)}"</div>
          <div class="modal-quote-page">— ${esc(tip.page)}</div>
        </div>

        <div class="modal-tips-title">${practiceLabel}</div>
        ${tip.tips.map(t => `
        <div class="modal-tip-item">
          <span class="modal-tip-dot">◆</span>
          <span>${esc(t)}</span>
        </div>`).join('')}
      </div>
    </div>`;

  // Close on backdrop click (outside modal-box)
  el.addEventListener('click', e => {
    if (e.target === el) closeModal();
  });

  // Close on Escape key
  el._keyHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', el._keyHandler);

  document.body.appendChild(el);
}

function closeModal() {
  const el = document.querySelector('.modal-backdrop');
  if (!el) return;
  if (el._keyHandler) document.removeEventListener('keydown', el._keyHandler);
  el.remove();
}

/* ==============================================================
   INIT
   ============================================================== */
render();
</script>
